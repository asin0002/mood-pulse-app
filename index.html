<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Pulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="mint-gradient min-h-screen text-slate-800">
    <nav
      class="flex items-center justify-between px-10 py-6 sticky top-0 bg-white/30 backdrop-blur-md z-50"
    >
      <div class="flex items-center gap-8">
        <span class="text-xl font-bold tracking-tighter">Mood Pulse</span>
        <div class="flex gap-6 text-sm font-medium text-slate-500">
          <button
            id="nav-pulse"
            class="text-teal-600 border-b-2 border-teal-600"
          >
            Pulse
          </button>
          <button id="nav-favs" class="hover:text-teal-600 transition">
            Favorites
          </button>
        </div>
      </div>
      <div
        class="w-8 h-8 rounded-full border border-slate-300 flex items-center justify-center text-xs"
      >
        👤
      </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-10">
      <section id="home-page">
        <header class="mb-10">
          <h1 class="text-5xl font-bold mb-4">How are you today?</h1>
          <p class="text-slate-500 max-w-lg text-lg">
            Capture your emotional rhythm and discover peace.
          </p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-16">
          <button
            class="mood-card bg-white rounded-3xl p-10 flex flex-col items-center shadow-sm"
            data-mood="happy"
          >
            <span class="text-4xl mb-4">😊</span
            ><span class="font-semibold">Happy</span>
          </button>
          <button
            class="mood-card bg-white rounded-3xl p-10 flex flex-col items-center shadow-sm"
            data-mood="tired"
          >
            <span class="text-4xl mb-4">☁️</span
            ><span class="font-semibold">Tired</span>
          </button>
          <button
            class="mood-card bg-white rounded-3xl p-10 flex flex-col items-center shadow-sm"
            data-mood="bored"
          >
            <span class="text-4xl mb-4">⌛</span
            ><span class="font-semibold">Bored</span>
          </button>
          <button
            class="mood-card bg-white rounded-3xl p-10 flex flex-col items-center shadow-sm"
            data-mood="stressed"
          >
            <span class="text-4xl mb-4">⚡</span
            ><span class="font-semibold">Stressed</span>
          </button>
        </div>

        <div
          id="rec-container"
          class="hidden bg-[#e0f7f7]/60 rounded-[2.5rem] p-10 flex flex-col md:flex-row items-center gap-8 mb-20 animate-fade"
        >
          <div class="flex-1">
            <p
              class="text-[10px] font-bold tracking-widest text-teal-600 uppercase mb-4"
            >
              Recommended for you
            </p>
            <h2
              id="rec-title"
              class="text-3xl font-bold mb-4 leading-tight"
            ></h2>
            <p id="rec-desc" class="text-slate-600 mb-8 leading-relaxed"></p>
            <div class="flex flex-wrap gap-4">
              <button
                id="save-btn"
                class="bg-[#0077b6] text-white px-6 py-3 rounded-full font-bold hover:bg-[#023e8a] transition shadow-lg"
              >
                Save to Favorites
              </button>
              <button
                id="try-another-btn"
                class="border-2 border-teal-600 text-teal-700 px-6 py-3 rounded-full font-bold hover:bg-teal-50/50 transition"
              >
                Try Another
              </button>
              <button id="clear-btn" class="text-slate-400 text-sm font-bold">
                Dismiss
              </button>
            </div>
          </div>
          <img
            id="rec-img"
            src=""
            class="w-full md:w-64 h-64 rounded-3xl object-cover shadow-xl"
          />
        </div>

        <h3 class="text-xl font-bold mb-6">Recent Pulses</h3>
        <div id="history-list" class="space-y-4"></div>
      </section>

      <section id="favorites-page" class="hidden">
        <h1 class="text-4xl font-bold mb-8">Your Favorites</h1>
        <div id="favs-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
